operations:
  - name: sys_uptime
    risk: read-only
    command: [uptime]

  - name: sys_disk
    risk: read-only
    command: [df, -h]

  - name: sys_memory
    risk: read-only
    command: [free, -h]

  - name: sys_containers
    risk: read-only
    command: [docker, ps]

  - name: sys_images
    risk: read-only
    command: [docker, images]

  - name: sys_listening_ports
    risk: read-only
    command: [ss, -tuln]

  - name: sys_network
    risk: read-only
    command: [ip, -br, addr]

  - name: sys_failed_units
    risk: read-only
    command: [systemctl, --failed, --no-pager]

  - name: sys_pull_image
    risk: mutating
    inverse: sys_remove_image
    command: [docker, pull, "{image}"]
    precheck: [docker, images, "{image}"]
    params:
      - name: image
        allow: [hello-world, alpine, busybox, nginx]

  - name: sys_remove_image
    risk: mutating
    inverse: sys_pull_image
    command: [docker, rmi, "{image}"]
    precheck: [docker, images, "{image}"]
    params:
      - name: image
        allow: [hello-world, alpine, busybox, nginx]

  - name: sys_container_logs
    risk: read-only
    command: [docker, logs, --tail, "200", "{container}"]
    params:
      - name: container
        allow: [web, nginx]
