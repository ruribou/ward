# ward operation registry — the single source of truth for "what ward can do".
#
# Add a capability by adding an entry here. This is a reviewable diff, not a code
# change. The loader (src/operations.ts) validates every entry at startup and
# REFUSES TO START if anything is unsafe, so by construction:
#   - `command` is an argv array of constants (NO shell; run via execFile).
#   - every argument matches [A-Za-z0-9_.-]+ — no spaces, no ; | $ ( ) ` etc.
#   - the model never supplies any part of a command; it only chooses which to run.
#   - `risk` is read-only or mutating. (M2 is still entirely read-only.)
#
# Tools that need an argument (e.g. `docker logs <name>`) are deliberately NOT
# here yet: model-supplied input needs its own validation guardrail, which is a
# later, separate step.

operations:
  - name: nuc_uptime
    title: 稼働状況
    description: NUC の稼働時間とロードアベレージ（uptime）を返す。
    risk: read-only
    command: [uptime]

  - name: nuc_disk
    title: ディスク使用量
    description: NUC のファイルシステム使用量（df -h）を返す。単一 SSD のため満杯は事故源——状態確認の最優先項目。
    risk: read-only
    command: [df, -h]

  - name: nuc_memory
    title: メモリ使用量
    description: NUC のメモリ／スワップ使用量（free -h）を返す。
    risk: read-only
    command: [free, -h]

  - name: nuc_containers
    title: 稼働中コンテナ
    description: NUC で稼働中の Docker コンテナ一覧（docker ps）を返す。
    risk: read-only
    command: [docker, ps]

  - name: nuc_images
    title: Docker イメージ
    description: NUC が保持する Docker イメージ一覧（docker images）を返す。
    risk: read-only
    command: [docker, images]

  - name: nuc_ports
    title: 待ち受けポート
    description: NUC が待ち受けている TCP/UDP ソケット一覧（ss -tuln）を返す。公開面（攻撃面）の確認に。
    risk: read-only
    command: [ss, -tuln]

  - name: nuc_network
    title: ネットワーク
    description: NUC の各インターフェースの IP アドレス一覧（ip -br addr）を返す。
    risk: read-only
    command: [ip, -br, addr]

  - name: nuc_failed
    title: 失敗したサービス
    description: 起動・実行に失敗した systemd ユニット一覧（systemctl --failed）を返す。健全性の最初の確認に。
    risk: read-only
    command: [systemctl, --failed, --no-pager]
