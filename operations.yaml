operations:
  - name: sys_uptime
    risk: read-only
    command: [uptime]

  - name: sys_disk
    risk: read-only
    command: [df, -h]

  - name: sys_memory
    risk: read-only
    command: [free, -h]

  - name: sys_containers
    risk: read-only
    command: [docker, ps]

  - name: sys_images
    risk: read-only
    command: [docker, images]

  - name: sys_listening_ports
    risk: read-only
    command: [ss, -tuln]

  - name: sys_network
    risk: read-only
    command: [ip, -br, addr]

  - name: sys_failed_units
    risk: read-only
    command: [systemctl, --failed, --no-pager]

  - name: sys_pull_image
    risk: mutating
    inverse: sys_remove_image
    command: [docker, pull, "{image}"]
    precheck: [docker, images, "{image}"]
    params:
      - name: image
        allow: [hello-world, alpine, busybox, nginx]

  - name: sys_remove_image
    risk: mutating
    inverse: sys_pull_image
    command: [docker, rmi, "{image}"]
    precheck: [docker, images, "{image}"]
    params:
      - name: image
        allow: [hello-world, alpine, busybox, nginx]

  - name: sys_container_logs
    risk: read-only
    command: [docker, logs, --tail, "200", "{container}"]
    params:
      - name: container
        allow: [web, nginx]

  - name: sys_run_container
    risk: mutating
    inverse: sys_remove_container
    command: [docker, run, -d, --name, "{name}", -p, "{publish}", "{image}"]
    precheck: [docker, images, "{image}"]
    params:
      - name: name
        allow: [web]
      - name: publish
        type: port
        allow: ["8080:80"]
      - name: image
        allow: [nginx]

  - name: sys_remove_container
    risk: mutating
    inverse: sys_run_container
    command: [docker, rm, -f, "{name}"]
    precheck: [docker, ps, -a]
    params:
      - name: name
        allow: [web]

  - name: sys_stop_container
    risk: mutating
    inverse: sys_start_container
    command: [docker, stop, "{name}"]
    precheck: [docker, ps]
    params:
      - name: name
        allow: [web]

  - name: sys_start_container
    risk: mutating
    inverse: sys_stop_container
    command: [docker, start, "{name}"]
    precheck: [docker, ps, -a]
    params:
      - name: name
        allow: [web]

  - name: sys_http_check
    risk: read-only
    command: [curl, -sS, -I, --max-time, "5", "{url}"]
    params:
      - name: url
        type: url
        allow: ["http://localhost:8080/"]
