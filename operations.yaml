operations:
  - name: nuc_uptime
    risk: read-only
    command: [uptime]

  - name: nuc_disk
    risk: read-only
    command: [df, -h]

  - name: nuc_memory
    risk: read-only
    command: [free, -h]

  - name: nuc_containers
    risk: read-only
    command: [docker, ps]

  - name: nuc_images
    risk: read-only
    command: [docker, images]

  - name: nuc_ports
    risk: read-only
    command: [ss, -tuln]

  - name: nuc_network
    risk: read-only
    command: [ip, -br, addr]

  - name: nuc_failed
    risk: read-only
    command: [systemctl, --failed, --no-pager]

  - name: nuc_pull
    risk: mutating
    command: [docker, pull, hello-world]

  - name: nuc_rmi
    risk: mutating
    command: [docker, rmi, hello-world]
