ops:
  sys_uptime:
    title: 稼働状況
    description: ホストの稼働時間とロードアベレージ（uptime）を返す。
  sys_disk:
    title: ディスク使用量
    description: ホストのファイルシステム使用量（df -h）を返す。単一 SSD のため満杯は事故源——状態確認の最優先項目。
  sys_memory:
    title: メモリ使用量
    description: ホストのメモリ／スワップ使用量（free -h）を返す。
  sys_containers:
    title: 稼働中コンテナ
    description: ホストで稼働中の Docker コンテナ一覧（docker ps）を返す。
  sys_images:
    title: Docker イメージ
    description: ホストが保持する Docker イメージ一覧（docker images）を返す。
  sys_listening_ports:
    title: 待ち受けポート
    description: ホストが待ち受けている TCP/UDP ソケット一覧（ss -tuln）を返す。公開面（攻撃面）の確認に。
  sys_network:
    title: ネットワーク
    description: ホストの各インターフェースの IP アドレス一覧（ip -br addr）を返す。
  sys_failed_units:
    title: 失敗したサービス
    description: 起動・実行に失敗した systemd ユニット一覧（systemctl --failed）を返す。健全性の最初の確認に。
  sys_pull_image:
    title: イメージ取得
    description: ホストに Docker イメージを取得する（docker pull）。許可リストから選ぶ（image — hello-world / alpine / busybox / nginx のいずれか）。ホストのディスク状態を変える書き込み操作——承認が要る。取得結果は sys_images で確認できる。
    plan: 選んだイメージをホストのローカル Docker イメージストアに追加する。既にあれば更新のみで他は変わらない。sys_remove_image で巻き戻せる。
  sys_remove_image:
    title: イメージ削除
    description: ホストから Docker イメージを削除する（docker rmi）。許可リストから選ぶ（image — hello-world / alpine / busybox / nginx のいずれか）。sys_pull_image の逆＝巻き戻し操作。書き込み操作——承認が要る。
    plan: 選んだイメージをホストのローカル Docker イメージストアから削除する。無ければ何も起きない（no-op）。sys_pull_image で巻き戻せる。
proposal:
  notice: |-
    提案 {id} — この操作はホストを変更します（risk: {risk}）。人間が承認するまで実行されません。
    $ {command}  on {host}
    {plan}
    承認は out-of-band です。あなた自身のターミナルで実行してください:  ward approve {id}
    （保留中は ward list で確認。AI に承認ツールはありません——AI が代わりに承認することはできません。）
  plan: "plan: {description}"
  precheck: "先に確認（read-only）: $ {precheck}"
cli:
  notFound: 'ward: 承認できません — 提案 "{id}" は存在しないか、既に使用済みです。'
  noPending: 保留中の提案はありません。
  pendingHeader: "保留中の提案（承認は: ward approve <id>）:"
  discarded: 'ward: 提案 "{id}" を破棄しました。'
  metricsNoSource: "ward metrics: ログのパスを渡すか、WARD_AUDIT_LOG を設定するか、stdin にログを流してください。"
  metricsReadFailed: 'ward metrics: "{source}" を読めません — {error}'
  usage: |-
    ward — AI が提案したインフラ変更を、人間が承認するためのコマンド。
    使い方:
      ward list             保留中の提案（と plan）を表示
      ward approve <id>     保留中の提案を承認して実行
      ward reject <id>      提案を実行せずに破棄
      ward metrics [path]   監査ログを集計（成功率 / 介入率 / blast radius）
