ops:
  sys_uptime:
    title: Uptime
    description: Returns the host's uptime and load average (uptime).
  sys_disk:
    title: Disk usage
    description: Returns the host's filesystem usage (df -h). With a single SSD a full disk is a top failure source — the first thing to check.
  sys_memory:
    title: Memory usage
    description: Returns the host's memory and swap usage (free -h).
  sys_containers:
    title: Running containers
    description: Returns the Docker containers running on the host (docker ps).
  sys_images:
    title: Docker images
    description: Returns the Docker images stored on the host (docker images).
  sys_listening_ports:
    title: Listening ports
    description: Returns the TCP/UDP sockets the host is listening on (ss -tuln) — for checking the exposed (attack) surface.
  sys_network:
    title: Network
    description: Returns the IP address of each of the host's interfaces (ip -br addr).
  sys_failed_units:
    title: Failed services
    description: Returns the systemd units that failed to start or run (systemctl --failed) — a first health check.
  sys_pull_image:
    title: Pull image
    description: Pulls a Docker image onto the host (docker pull), chosen from a fixed allowlist (image — one of hello-world, alpine, busybox, nginx). A write operation that changes the host's disk state — it requires approval. Check the result with sys_images.
    plan: Adds the chosen image to the host's local Docker image store. If it is already present this only refreshes it — nothing else changes. Reversible with sys_remove_image.
  sys_remove_image:
    title: Remove image
    description: Removes a Docker image from the host (docker rmi), chosen from a fixed allowlist (image — one of hello-world, alpine, busybox, nginx). The inverse of sys_pull_image — a rollback. A write operation — it requires approval.
    plan: Removes the chosen image from the host's local Docker image store. If it is not present this is a no-op. Reversible with sys_pull_image.
  sys_container_logs:
    title: Container logs
    description: Returns the last 200 log lines of a Docker container (docker logs --tail 200), chosen from a fixed allowlist (container — one of web, nginx). Read-only — for checking what a service is doing or why it failed.
  sys_run_container:
    title: Run container
    description: Starts a Docker container in the background, publishing a container port to a fixed host port (docker run -d --name <name> -p <publish> <image>), each chosen from a fixed allowlist (name — web; publish — 8080:80; image — nginx). A write operation that changes the host's running state — it requires approval. Verify it is serving with sys_http_check.
    plan: Creates and starts a container from the chosen image, publishing its container port to the chosen fixed host port (e.g. host 8080 → container 80). Reversible with sys_remove_container.
  sys_remove_container:
    title: Remove container
    description: Force-removes a Docker container (docker rm -f), chosen from a fixed allowlist (name — web). The inverse of sys_run_container — a rollback. A write operation — it requires approval.
    plan: Stops and removes the chosen container. If it does not exist this is a no-op. Reversible with sys_run_container.
  sys_stop_container:
    title: Stop container
    description: Stops a running Docker container (docker stop), chosen from a fixed allowlist (name — web). A write operation — it requires approval. Reversible by starting it again.
    plan: Stops the chosen container (it stays on the host and can be started again). Reversible with sys_start_container.
  sys_start_container:
    title: Start container
    description: Starts a stopped Docker container (docker start), chosen from a fixed allowlist (name — web). The inverse of sys_stop_container. A write operation — it requires approval.
    plan: Starts the chosen stopped container. Reversible with sys_stop_container.
  sys_http_check:
    title: HTTP check
    description: Sends an HTTP HEAD request to a fixed allowlisted localhost URL and returns the status line and headers (curl -sS -I --max-time 5 <url>; url — one of http://localhost:8080/). Read-only — for confirming a container started with sys_run_container is actually serving (a 200 status). Does not follow redirects, so it stays on the loopback host.
proposal:
  notice: |-
    Proposal {id} — this operation changes the host (risk: {risk}). It will not run until a human approves it.
    $ {command}  on {host}
    {plan}
    Approval is out of band: in your own terminal, run  ward approve {id}
    (ward list shows pending proposals. The AI has no approve tool — it cannot approve this for you.)
  plan: "Plan: {description}"
  precheck: "Verify first (read-only): $ {precheck}"
gate:
  reversible: "Reversible: undo this change with {inverse}."
  irreversible: "Irreversible: this change cannot be undone — there is no inverse operation."
cli:
  notFound: 'ward: cannot approve — proposal "{id}" does not exist or was already used.'
  noPending: No pending proposals.
  pendingHeader: "Pending proposals (approve one with: ward approve <id>):"
  discarded: 'ward: discarded proposal "{id}".'
  metricsNoSource: "ward metrics: give a log path, set WARD_AUDIT_LOG, or pipe a log on stdin."
  metricsReadFailed: 'ward metrics: cannot read "{source}" — {error}'
  wait:
    usage: |-
      ward wait <id> [--timeout=<sec>] [--interval=<ms>] — block until a human consumes proposal <id>.
      Read-only: it only OBSERVES the pending store; it never approves. A human still runs ward approve.
      Defaults: --timeout=600 (seconds), --interval=1000 (ms). Exits 0 when consumed, 124 on timeout.
    consumed: 'ward: proposal "{id}" left the pending store — a human approved or rejected it. Approval stays human; ward wait only watched. Now verify the host actually changed with read-only operations: a FAILED approval also consumes the proposal, so do not assume success.'
    timeout: 'ward: timed out after {timeout}s — proposal "{id}" is still pending (no change made). Run ward wait again, or check ward list.'
    invalidId: 'ward: "{id}" is not a valid proposal id (expected p<number>, e.g. p1).'
  usage: |-
    ward — human approval for pending infrastructure changes proposed by the AI.
    Usage:
      ward list             show pending proposals (and their plan)
      ward approve <id>     approve and run a pending proposal
      ward reject <id>      discard a pending proposal without running it
      ward wait <id>        block until a human approves/rejects <id> (read-only; exit 124 on timeout)
      ward metrics [path]   summarize the audit log (success / intervention / blast radius)
      ward config ...       view or set user preferences (language, ssh_host)
  config:
    usage: |-
      ward config — view or set user preferences in ~/.ward/config.yaml.
      Usage:
        ward config get            show the stored preferences (and the file path)
        ward config set <key> <v>  set a preference (key: language | ssh_host)
        ward config path           print the resolved config file path
      Note: ssh_host is an ALIAS only (resolved by ~/.ssh/config) — never a real IP or hostname.
    getHeader: "ward config — preferences in {path}:"
    valueLine: "  {key} = {value}"
    unsetLine: "  {key} = (unset → default)"
    setOk: "ward config: set {key} = {value} in {path}"
    unknownKey: 'ward config: "{key}" is not a settable key (try: language, ssh_host).'
    invalidValue: "ward config: {error}"
    path: "{path}"
