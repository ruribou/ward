title = "ward gitleaks config"

# Start from gitleaks' built-in rules (API keys, tokens, private keys, …) and add
# the project-specific shape: a real infra host address must never land in this
# public repo (CLAUDE.local.md keeps those in gitignored inventory files).
[extend]
useDefault = true

[[rules]]
id = "ward-infra-ipv4"
description = "Real infra address (RFC1918 / Tailscale CGNAT) — keep out of this public repo"
regex = '''\b(10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|192\.168\.[0-9]{1,3}\.[0-9]{1,3}|172\.(1[6-9]|2[0-9]|3[01])\.[0-9]{1,3}\.[0-9]{1,3}|100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\.[0-9]{1,3}\.[0-9]{1,3})\b'''
[rules.allowlist]
description = "Loopback / any-address are not infra addresses"
regexes = ['''127\.0\.0\.1''', '''0\.0\.0\.0''']

[allowlist]
description = "Files that legitimately contain secret-LIKE patterns (the scanners themselves)"
paths = [
  '''\.githooks/.*''',
  '''\.gitleaks\.toml''',
]
